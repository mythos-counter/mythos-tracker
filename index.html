<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Naruto Mythos — Contador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --left: #D9531E;
    --left-dark: #B33F14;
    --right: #1F4E5A;
    --right-dark: #163944;
    --diff-bg: #12181B;
    --ink: #FFFFFF;
    --ink-dim: rgba(255,255,255,0.72);
    --topbar-h: 112px;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }

  html, body{
    margin:0;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:"Inter",system-ui,sans-serif;
  }

  .app{
    display:flex;
    flex-direction:column;
    height:100dvh;
    width:100vw;
  }

  /* ---- Top bar: Points / Diff / Points ---- */
  .topbar{
    display:flex;
    height:var(--topbar-h);
    flex-shrink:0;
  }
  .points{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    color:var(--ink);
  }
  .points.left{ background:var(--left-dark); }
  .points.right{ background:var(--right-dark); }

  .points-row{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .points.left .points-row{ flex-direction:row; }
  .points.right .points-row{ flex-direction:row-reverse; }

  .points-label{
    font-size:14px;
    font-weight:800;
    letter-spacing:0.14em;
    color:var(--ink-dim);
  }

  .points-value{
    font-size:56px;
    font-weight:900;
    font-variant-numeric:tabular-nums;
    min-width:1.2em;
    text-align:center;
  }

  .diff{
    width:110px;
    flex-shrink:0;
    background:var(--diff-bg);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:var(--ink);
  }
  .diff-label{
    font-size:11px;
    font-weight:800;
    letter-spacing:0.16em;
    color:rgba(255,255,255,0.5);
  }
  .diff-value{
    font-size:32px;
    font-weight:900;
    font-variant-numeric:tabular-nums;
    margin-top:1px;
  }

  .end-round-btn{
    margin-top:8px;
    appearance:none;
    border:none;
    background:rgba(255,255,255,0.14);
    color:rgba(255,255,255,0.85);
    font-family:"Inter",system-ui,sans-serif;
    font-size:10px;
    font-weight:800;
    letter-spacing:0.08em;
    padding:6px 10px;
    border-radius:999px;
    cursor:pointer;
  }
  .end-round-btn:active{ background:rgba(255,255,255,0.28); }

  /* ---- Main area: Chakra left / right ---- */
  .main{
    display:flex;
    flex:1;
    min-height:0;
  }
  .chakra{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:clamp(16px, 5vw, 48px);
    position:relative;
    color:var(--ink);
  }
  .chakra.left{ background:var(--left); flex-direction:row; }
  .chakra.right{ background:var(--right); flex-direction:row; }

  .chakra-label{
    position:absolute;
    top:16px;
    left:0; right:0;
    text-align:center;
    font-size:clamp(16px, 3.2vh, 22px);
    font-weight:800;
    letter-spacing:0.18em;
    color:var(--ink-dim);
  }

  .chakra-value{
    font-size:clamp(100px, 48vh, 340px);
    font-weight:900;
    font-variant-numeric:tabular-nums;
    line-height:1;
    min-width:1.3ch;
    text-align:center;
  }

  button.step{
    appearance:none;
    border:none;
    background:rgba(255,255,255,0.16);
    color:var(--ink);
    font-family:"Inter",system-ui,sans-serif;
    font-weight:900;
    border-radius:999px;
    cursor:pointer;
    touch-action:manipulation;
    line-height:1;
  }
  button.step:active{ background:rgba(255,255,255,0.32); }

  .step-points{
    width:54px; height:54px;
    font-size:28px;
  }
  .step-chakra{
    width:clamp(64px, 16vh, 120px);
    height:clamp(64px, 16vh, 120px);
    font-size:clamp(30px, 7vh, 48px);
  }

  .divider{
    width:2px;
    background:rgba(0,0,0,0.35);
    flex-shrink:0;
  }

  /* ---- Reset button ---- */
  .reset-btn{
    position:absolute;
    bottom:8px;
    left:50%;
    transform:translateX(-50%);
    appearance:none;
    border:none;
    background:rgba(255,255,255,0.14);
    color:rgba(255,255,255,0.85);
    font-family:"Inter",system-ui,sans-serif;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.06em;
    padding:6px 14px;
    border-radius:999px;
    cursor:pointer;
    z-index:5;
  }
  .reset-btn:active{ background:rgba(255,255,255,0.28); }

  /* ---- Overlays: sumar puntos / chakra inicial ---- */
  .overlay{
    display:none;
    position:fixed;
    inset:0;
    z-index:10;
    flex-direction:column;
    height:100dvh;
    width:100vw;
  }
  .overlay.showing{ display:flex; }

  .overlay-header{
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    height:52px;
    background:var(--diff-bg);
    color:var(--ink);
  }
  .overlay-title{
    font-size:13px;
    font-weight:800;
    letter-spacing:0.14em;
  }
  .overlay-cancel{
    position:absolute;
    left:14px;
    appearance:none;
    border:none;
    background:none;
    color:rgba(255,255,255,0.55);
    font-family:"Inter",system-ui,sans-serif;
    font-size:12px;
    font-weight:700;
    letter-spacing:0.06em;
    cursor:pointer;
    padding:8px;
  }

  .overlay-main{
    display:flex;
    flex:1;
    min-height:0;
  }
  .overlay-side{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:clamp(16px, 5vw, 48px);
    position:relative;
    color:var(--ink);
  }
  .overlay-side.left{ background:var(--left); flex-direction:row; }
  .overlay-side.right{ background:var(--right); flex-direction:row-reverse; }

  .overlay-value{
    font-size:clamp(90px, 42vh, 300px);
    font-weight:900;
    font-variant-numeric:tabular-nums;
    line-height:1;
    min-width:1.3ch;
    text-align:center;
  }

  .overlay-ok{
    position:absolute;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    appearance:none;
    border:none;
    background:rgba(255,255,255,0.92);
    color:#14202B;
    font-family:"Inter",system-ui,sans-serif;
    font-size:14px;
    font-weight:900;
    letter-spacing:0.08em;
    padding:10px 30px;
    border-radius:999px;
    cursor:pointer;
    z-index:5;
  }
  .overlay-ok:active{ background:#fff; }

  /* ---- Rotate hint for portrait ---- */
  .rotate-hint{
    display:none;
    position:fixed;
    inset:0;
    background:#12181B;
    color:#fff;
    z-index:20;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    text-align:center;
    padding:24px;
    font-family:"Inter",system-ui,sans-serif;
  }
  .rotate-hint .icon{ font-size:44px; }
  .rotate-hint p{ margin:0; font-size:15px; color:rgba(255,255,255,0.75); max-width:32ch; }

  @media (orientation:portrait){
    .app{ display:none; }
    .rotate-hint{ display:flex; }
  }
</style>
</head>
<body>

  <div class="rotate-hint">
    <div class="icon">📱↻</div>
    <p>Gira el móvil en horizontal para usar el contador.</p>
  </div>

  <div class="app">

    <div class="topbar">
      <div class="points left">
        <div class="points-label">POINTS</div>
        <div class="points-row">
          <button class="step points-plus" data-side="left" data-stat="points" data-delta="1">+</button>
          <span class="points-value" id="points-left">0</span>
          <button class="step points-minus" data-side="left" data-stat="points" data-delta="-1">–</button>
        </div>
      </div>

      <div class="diff">
        <div class="diff-label">DIFF</div>
        <div class="diff-value" id="diff">0</div>
        <button class="end-round-btn" id="end-round">END ROUND</button>
      </div>

      <div class="points right">
        <div class="points-label">POINTS</div>
        <div class="points-row">
          <button class="step points-plus" data-side="right" data-stat="points" data-delta="1">+</button>
          <span class="points-value" id="points-right">0</span>
          <button class="step points-minus" data-side="right" data-stat="points" data-delta="-1">–</button>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="chakra left">
        <div class="chakra-label">CHAKRA</div>
        <button class="step step-chakra" data-side="left" data-stat="chakra" data-delta="-1">–</button>
        <span class="chakra-value" id="chakra-left">5</span>
        <button class="step step-chakra" data-side="left" data-stat="chakra" data-delta="1">+</button>
      </div>

      <div class="divider"></div>

      <div class="chakra right">
        <div class="chakra-label">CHAKRA</div>
        <button class="step step-chakra" data-side="right" data-stat="chakra" data-delta="1">+</button>
        <span class="chakra-value" id="chakra-right">5</span>
        <button class="step step-chakra" data-side="right" data-stat="chakra" data-delta="-1">–</button>
      </div>

      <button class="reset-btn" id="reset">REINICIAR</button>
    </div>

  </div>

  <!-- Overlay 1: sumar puntos de victoria de la ronda -->
  <div class="overlay" id="overlay-points">
    <div class="overlay-header">
      <button class="overlay-cancel" id="points-overlay-cancel">CANCELAR</button>
      <div class="overlay-title">PUNTOS DE ESTA RONDA</div>
    </div>
    <div class="overlay-main">
      <div class="overlay-side left">
        <button class="step step-chakra" data-ov="points" data-side="left" data-delta="1">+</button>
        <span class="overlay-value" id="ov-points-left">0</span>
        <button class="step step-chakra" data-ov="points" data-side="left" data-delta="-1">–</button>
      </div>
      <div class="divider"></div>
      <div class="overlay-side right">
        <button class="step step-chakra" data-ov="points" data-side="right" data-delta="1">+</button>
        <span class="overlay-value" id="ov-points-right">0</span>
        <button class="step step-chakra" data-ov="points" data-side="right" data-delta="-1">–</button>
      </div>
      <button class="overlay-ok" id="points-overlay-ok">OK</button>
    </div>
  </div>

  <!-- Overlay 2: chakra inicial de la nueva ronda -->
  <div class="overlay" id="overlay-chakra">
    <div class="overlay-header">
      <button class="overlay-cancel" id="chakra-overlay-cancel">CANCELAR</button>
      <div class="overlay-title">CHAKRA INICIAL DE LA RONDA</div>
    </div>
    <div class="overlay-main">
      <div class="overlay-side left">
        <button class="step step-chakra" data-ov="chakra" data-side="left" data-delta="1">+</button>
        <span class="overlay-value" id="ov-chakra-left">5</span>
        <button class="step step-chakra" data-ov="chakra" data-side="left" data-delta="-1">–</button>
      </div>
      <div class="divider"></div>
      <div class="overlay-side right">
        <button class="step step-chakra" data-ov="chakra" data-side="right" data-delta="1">+</button>
        <span class="overlay-value" id="ov-chakra-right">5</span>
        <button class="step step-chakra" data-ov="chakra" data-side="right" data-delta="-1">–</button>
      </div>
      <button class="overlay-ok" id="chakra-overlay-ok">OK</button>
    </div>
  </div>

<script>
  const DEFAULTS = {
    left:  { chakra: 5, points: 0 },
    right: { chakra: 5, points: 0 },
    lastRoundChakra: { left: 5, right: 5 },
  };
  const STORAGE_KEY = "naruto-mythos-counter-v1";

  function loadState(){
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return structuredClone(DEFAULTS);
      const parsed = JSON.parse(raw);
      return {
        left:  { chakra: parsed.left?.chakra  ?? DEFAULTS.left.chakra,  points: parsed.left?.points  ?? DEFAULTS.left.points },
        right: { chakra: parsed.right?.chakra ?? DEFAULTS.right.chakra, points: parsed.right?.points ?? DEFAULTS.right.points },
        lastRoundChakra: {
          left:  parsed.lastRoundChakra?.left  ?? DEFAULTS.lastRoundChakra.left,
          right: parsed.lastRoundChakra?.right ?? DEFAULTS.lastRoundChakra.right,
        },
      };
    } catch { return structuredClone(DEFAULTS); }
  }

  function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  let state = loadState();

  function render(){
    document.getElementById("chakra-left").textContent  = state.left.chakra;
    document.getElementById("chakra-right").textContent = state.right.chakra;
    document.getElementById("points-left").textContent  = state.left.points;
    document.getElementById("points-right").textContent = state.right.points;
    document.getElementById("diff").textContent = Math.abs(state.left.points - state.right.points);
  }

  function change(side, stat, delta){
    const next = state[side][stat] + delta;
    state[side][stat] = Math.max(0, next);
    render();
    saveState();
  }

  document.querySelectorAll("button.step[data-stat]").forEach(btn => {
    btn.addEventListener("click", () => {
      change(btn.dataset.side, btn.dataset.stat, Number(btn.dataset.delta));
    });
  });

  document.getElementById("reset").addEventListener("click", () => {
    if (confirm("¿Reiniciar Chakra y Puntos de ambos jugadores?")) {
      state = structuredClone(DEFAULTS);
      render();
      saveState();
    }
  });

  // ---- Overlay: fin de ronda (sumar puntos -> chakra inicial) ----
  const overlayPoints = document.getElementById("overlay-points");
  const overlayChakra = document.getElementById("overlay-chakra");
  let ovPoints = { left: 0, right: 0 };
  let ovChakra = { left: 5, right: 5 };

  function renderOverlayPoints(){
    document.getElementById("ov-points-left").textContent  = ovPoints.left;
    document.getElementById("ov-points-right").textContent = ovPoints.right;
  }
  function renderOverlayChakra(){
    document.getElementById("ov-chakra-left").textContent  = ovChakra.left;
    document.getElementById("ov-chakra-right").textContent = ovChakra.right;
  }

  document.getElementById("end-round").addEventListener("click", () => {
    ovPoints = { left: 0, right: 0 };
    renderOverlayPoints();
    overlayPoints.classList.add("showing");
  });

  document.querySelectorAll('button.step[data-ov="points"]').forEach(btn => {
    btn.addEventListener("click", () => {
      const side = btn.dataset.side, delta = Number(btn.dataset.delta);
      ovPoints[side] = Math.max(0, ovPoints[side] + delta);
      renderOverlayPoints();
    });
  });

  document.querySelectorAll('button.step[data-ov="chakra"]').forEach(btn => {
    btn.addEventListener("click", () => {
      const side = btn.dataset.side, delta = Number(btn.dataset.delta);
      ovChakra[side] = Math.max(0, ovChakra[side] + delta);
      renderOverlayChakra();
    });
  });

  document.getElementById("points-overlay-cancel").addEventListener("click", () => {
    overlayPoints.classList.remove("showing");
  });

  document.getElementById("points-overlay-ok").addEventListener("click", () => {
    state.left.points  = Math.max(0, state.left.points  + ovPoints.left);
    state.right.points = Math.max(0, state.right.points + ovPoints.right);
    render();
    saveState();
    overlayPoints.classList.remove("showing");

    ovChakra = { left: state.lastRoundChakra.left, right: state.lastRoundChakra.right };
    renderOverlayChakra();
    overlayChakra.classList.add("showing");
  });

  document.getElementById("chakra-overlay-cancel").addEventListener("click", () => {
    overlayChakra.classList.remove("showing");
  });

  document.getElementById("chakra-overlay-ok").addEventListener("click", () => {
    state.left.chakra  = ovChakra.left;
    state.right.chakra = ovChakra.right;
    state.lastRoundChakra = { left: ovChakra.left, right: ovChakra.right };
    render();
    saveState();
    overlayChakra.classList.remove("showing");
  });

  render();
</script>
</body>
</html>
